<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Neuen Lead anlegen</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:#F5F8FA;color:#33475B}
    .container{max-width:900px;margin:0 auto;padding:24px}
    .card{background:#fff;border:1px solid #CBD6E2;border-radius:6px;padding:16px 20px}
    label{display:block;margin-top:10px}
    input,select,textarea{width:100%;padding:8px;margin-top:4px}
    .btn{margin-top:16px;padding:10px 14px;border:1px solid #CBD6E2;border-radius:6px;background:#fff;cursor:pointer}
    .primary{background:#FF7A59;border-color:#FF7A59;color:#fff}
  </style>
</head>
<body>
<div class="container">
  <p><a href="/">« Zurück</a></p>
  <h1>Neuen Lead anlegen</h1>
  <div class="card">
    <form action="/leads/new" method="post">
      <label>Anrede
        <select name="anrede">
          <option value="-" selected>-</option>
          <option value="Herr">Herr</option>
          <option value="Frau">Frau</option>
        </select>
      </label>
      <label>Vorname <input type="text" name="vorname"></label>
      <label>Nachname* <input type="text" name="nachname" required></label>
      <label>E-Mail <input type="email" name="email"></label>
      <label>Telefon <input type="text" name="telefon"></label>
      <label>Kundentyp* <input type="text" name="kundentyp" required></label>
      <label>Lead-Art* <input type="text" name="lead_art" required></label>
      <label>Notizen <textarea name="notes"></textarea></label>
      <button type="submit" class="btn primary">Speichern</button>
      <a href="/" class="btn">Abbrechen</a>
    </form>
  </div>
</div>
</body>
</html>
